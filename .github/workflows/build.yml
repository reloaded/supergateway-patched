name: build

# Real image build WITHOUT publishing — proves the pinned clone +
# PR-merge + tsc build actually works in CI. Runs on every PR (so a
# PR's changes are proven to build), on push to main, and on
# workflow_dispatch against any branch. Never pushes an image; the
# GHCR push happens ONLY on a version tag (release.yml).
on:
  workflow_dispatch:
    inputs:
      supergateway_ref:
        description: "Upstream supergateway ref (overrides ARG default)"
        required: false
        default: ""
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (arm64 emulation for multi-arch build)
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Assemble build args
        id: args
        run: |
          {
            [ -n "${{ inputs.supergateway_ref }}" ] && echo "SUPERGATEWAY_REF=${{ inputs.supergateway_ref }}"
            true
          } > /tmp/bargs
          {
            echo 'build-args<<EOF'
            cat /tmp/bargs
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Build image (linux/amd64 + linux/arm64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build both arches so a PR catches arm64-only breakage
          # (consumers run on arm64 RPi nodes too).
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: ${{ steps.args.outputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
